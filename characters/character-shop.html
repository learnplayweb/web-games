<!-- v0.1.0 : 최초 생성 - 캐릭터 상점 화면 (UI만, 기능 미구현)
     v0.1.1 : 파츠 슬롯 클릭 모달 추가
     v0.1.2 : Refactor_공통 Sticky Header 적용, 가격 수정, 모달 이름 제거
     v0.1.3 : Refactor_캐릭터 placeholder 눈/입과 파츠 슬롯 아이콘을
              하드코딩 SVG에서 assets fetch 기반 inline SVG로 교체 -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>캐릭터 상점</title>
  <link rel="stylesheet" href="../shared/header.css" />
  <link rel="stylesheet" href="character-shop.css" />
</head>
<body>

  <div class="shop-wrapper">

    <!-- ① 캐릭터 영역 -->
    <section class="character-area">
      <!-- 더미 플레이스홀더 SVG (추후 실제 캐릭터로 교체) -->
      <svg class="character-placeholder" viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg">
        <!-- 머리 (찌글찌글한 원형) -->
        <path d="M80,20 C105,18 125,35 126,58 C127,82 110,100 85,102 C60,104 42,88 40,64 C38,40 55,22 80,20 Z"
              fill="none" stroke="#b0bac6" stroke-width="3" stroke-linecap="round"/>
        <!-- 눈 / 입 : character-shop.js에서 assets/face/eyes-idle.svg, mouth-idle.svg를
             fetch하여 nested <svg>로 삽입한다 (embedSvgFragment, svgLoader.js 참고) -->
        <g id="face-eyes-slot"></g>
        <g id="face-mouth-slot"></g>
        <!-- 플레이스홀더 안내 -->
        <text x="80" y="148" font-size="11" fill="#b0bac6" text-anchor="middle">아직 꼬무리가 없어요</text>
      </svg>
      <p class="character-name">이름 없음</p>
    </section>

    <!-- ② 기능 버튼 섹션 -->
    <section class="shop-section">
      <div class="shop-section__header" style="padding-bottom:0;"></div>
      <div class="shop-section__body">
        <ul class="action-list">
          <li class="action-item">
            <button type="button" class="action-item__btn" id="btn-combine">
              <span>조합</span><span class="action-item__price">💎 50</span>
            </button>
          </li>
          <li class="action-item">
            <button type="button" class="action-item__btn" id="btn-dismantle">
              <span>해체</span><span class="action-item__price">💎 50</span>
            </button>
          </li>
          <li class="action-item">
            <button type="button" class="action-item__btn" id="btn-rename">
              <span>이름 변경</span><span class="action-item__price">💎 10</span>
            </button>
          </li>
          <li class="action-item action-item--save">
            <button type="button" class="action-item__btn" id="btn-save">캐릭터 저장하기</button>
          </li>
        </ul>
      </div>
    </section>

    <!-- ③ 파츠 섹션 (기본 펼침) -->
    <section class="shop-section">
      <div class="shop-section__header">꼬무리</div>
      <div class="shop-section__body" id="parts-body">

        <div class="parts-grid">

          <!-- 슬롯 1: 원 -->
          <div class="part-slot part-slot--locked" data-part="1" data-name="원" data-owned="0">
            <!-- character-shop.js에서 assets/parts/p-circle.svg를 fetch하여 채운다 -->
            <svg class="part-slot__svg" viewBox="0 0 56 56"></svg>
          </div>

          <!-- 슬롯 2: 세모 -->
          <div class="part-slot part-slot--locked" data-part="2" data-name="세모" data-owned="0">
            <!-- character-shop.js에서 assets/parts/p-triangle-u.svg를 fetch하여 채운다 -->
            <svg class="part-slot__svg" viewBox="0 0 56 56"></svg>
          </div>

          <!-- 슬롯 3: 네모 -->
          <div class="part-slot part-slot--locked" data-part="3" data-name="네모" data-owned="0">
            <!-- character-shop.js에서 assets/parts/p-square.svg를 fetch하여 채운다 -->
            <svg class="part-slot__svg" viewBox="0 0 56 56"></svg>
          </div>

          <!-- 슬롯 4: 마름모 -->
          <div class="part-slot part-slot--locked" data-part="4" data-name="마름모" data-owned="0">
            <!-- character-shop.js에서 assets/parts/p-diamond.svg를 fetch하여 채운다 -->
            <svg class="part-slot__svg" viewBox="0 0 56 56"></svg>
          </div>

          <!-- 슬롯 5: 별 -->
          <div class="part-slot part-slot--locked" data-part="5" data-name="별" data-owned="0">
            <!-- character-shop.js에서 assets/parts/p-star.svg를 fetch하여 채운다 -->
            <svg class="part-slot__svg" viewBox="0 0 56 56"></svg>
          </div>

          <!-- 슬롯 6: 럭비공형 -->
          <div class="part-slot part-slot--locked" data-part="6" data-name="럭비공" data-owned="0">
            <!-- character-shop.js에서 assets/parts/p-lens.svg를 fetch하여 채운다 -->
            <svg class="part-slot__svg" viewBox="0 0 56 56"></svg>
          </div>

          <!-- 슬롯 7: 역세모 -->
          <div class="part-slot part-slot--locked" data-part="7" data-name="역세모" data-owned="0">
            <!-- character-shop.js에서 assets/parts/p-triangle-d.svg를 fetch하여 채운다 -->
            <svg class="part-slot__svg" viewBox="0 0 56 56"></svg>
          </div>

          <!-- 슬롯 8: 랜덤 박스 -->
          <div class="part-slot" data-part="random" data-name="랜덤 박스">
            <svg class="part-slot__svg" viewBox="0 0 56 56">
              <rect x="7" y="7" width="42" height="42" rx="8"
                    fill="none" stroke="#b0bac6" stroke-width="2.5"/>
              <text x="28" y="34" font-size="18" text-anchor="middle" fill="#b0bac6">?</text>
            </svg>
          </div>

        </div><!-- /.parts-grid -->

      </div><!-- /#parts-body -->
    </section>

    <!-- ④ 색상 섹션 (기본 접힘) -->
    <section class="shop-section">
      <div class="shop-section__header">
        색상
        <button type="button" class="shop-section__toggle" id="toggle-color"
                aria-expanded="false" aria-controls="color-body">▼</button>
      </div>
      <div class="shop-section__body shop-section__body--hidden" id="color-body">
        <!-- 파스텔 12색 -->
        <div class="color-grid">
          <button type="button" class="color-slot" data-color="#FFCCBC" style="background:#FFCCBC;" aria-label="연빨강"></button>
          <button type="button" class="color-slot" data-color="#FCE8B2" style="background:#FCE8B2;" aria-label="연주황"></button>
          <button type="button" class="color-slot" data-color="#ffffba" style="background:#ffffba;" aria-label="노랑"></button>
          <button type="button" class="color-slot" data-color="#C4E2A0" style="background:#C4E2A0;" aria-label="연두"></button>
          <button type="button" class="color-slot" data-color="#ACC9FE" style="background:#ACC9FE;" aria-label="연파랑"></button>
          <button type="button" class="color-slot" data-color="#C4C3F7" style="background:#C4C3F7;" aria-label="보라"></button>
          <button type="button" class="color-slot" data-color="#FAE5EA" style="background:#FAE5EA;" aria-label="연분홍"></button>
          <button type="button" class="color-slot" data-color="#F6E1CF" style="background:#F6E1CF;" aria-label="복숭"></button>
          <button type="button" class="color-slot" data-color="#A2E8F1" style="background:#A2E8F1;" aria-label="민트"></button>
          <button type="button" class="color-slot" data-color="#8CD3CD" style="background:#8CD3CD;" aria-label="틸"></button>
          <button type="button" class="color-slot" data-color="#BBC8CE" style="background:#BBC8CE;" aria-label="청회색"></button>
          <button type="button" class="color-slot" data-color="#ffffff" style="background:#ffffff;" aria-label="랜덤"></button>
          
        </div>
        <button type="button" class="color-mix-btn">색 섞기 <span>💎 50</span></button>
      </div>
    </section>

    <!-- ⑤ 꾸밈 섹션 (기본 접힘, 기능 예약) -->
    <section class="shop-section">
      <div class="shop-section__header">
        꾸밈
        <button type="button" class="shop-section__toggle" id="toggle-decoration"
                aria-expanded="false" aria-controls="decoration-body">▼</button>
      </div>
      <div class="shop-section__body shop-section__body--hidden" id="decoration-body">
        <p style="color:var(--color-text-muted); font-size:0.9rem; padding: 0.5rem 0;">
          꾸밈 기능은 추후 업데이트 예정입니다.
        </p>
      </div>
    </section>

  </div><!-- /.shop-wrapper -->

  <!-- 파츠 모달 -->
  <div id="part-modal" class="modal-overlay modal-overlay--hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <!-- 선택한 파츠 SVG를 크게 표시 -->
      <div id="part-modal-svg" class="part-modal__preview"></div>
      <p id="part-modal-name" class="part-modal__name"></p>
      <div id="part-modal-actions" class="modal-card__actions"></div>
    </div>
  </div>

  <!-- 색상 모달 -->
  <div id="color-modal" class="modal-overlay modal-overlay--hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div id="color-modal-preview" class="part-modal__preview"></div>
      <div id="color-modal-actions" class="modal-card__actions"></div>
    </div>
  </div>

  <!-- 저장 확인 모달 -->
  <div id="save-modal" class="modal-overlay modal-overlay--hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <p class="modal-card__msg">캐릭터의 정보를<br>기기에 저장합니다.</p>
      <div class="modal-card__actions">
        <button type="button" class="modal-card__btn modal-card__btn--confirm" id="modal-confirm">저장</button>
        <button type="button" class="modal-card__btn modal-card__btn--cancel" id="modal-cancel">취소</button>
      </div>
    </div>
  </div>

  <script type="module" src="character-shop.js"></script>
</body>
</html>
