<!-- v0.1.0 : 최초 생성 - Web Games 허브 메인 화면
     v0.1.1 : 우상단 Gold 표시 추가
     v0.1.2 : 캐릭터 상점 카드 추가
     v0.1.3 : 상단 퀵버튼 영역 추가(캐릭터 상점, 도움말), 게임 카드 목록 분리
     v0.1.4 : Refactor_공통 Sticky Header 적용 -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Games</title>
  <link rel="stylesheet" href="shared/header.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 전체 페이지를 감싸는 래퍼 (PC 가운데 정렬용) -->
  <div class="wrapper">

    <!-- 헤더 영역: 제목 + 설명 -->
    <header class="site-header">
      <h1 class="site-title">Web Games</h1>
      <p class="site-desc">브라우저에서 바로 즐기는 미니 게임 모음</p>
    </header>

    <!-- 상단 퀵버튼: 캐릭터 상점 + 도움말 (게임 카드 절반 높이) -->
    <nav class="quick-grid">
      <a href="characters/character-shop.html" class="quick-btn quick-btn--active">
        <span class="quick-btn__icon">🧸</span>
        <span class="quick-btn__label">캐릭터 상점</span>
      </a>
      <button type="button" class="quick-btn quick-btn--soon" id="btn-help">
        <span class="quick-btn__icon">❓</span>
        <span class="quick-btn__label">도움말</span>
      </button>
    </nav>

    <!-- 게임 카드 목록 -->
    <main class="card-grid">

      <!-- Clock Game: 단계 선택 화면으로 이동 -->
      <a href="games/clock/select.html" class="card card--active">
        <div class="card__icon" aria-hidden="true">🕐</div>
        <h2 class="card__title">Clock Game</h2>
        <p class="card__desc">시계를 보고 시각을 맞혀보세요</p>
        <span class="card__badge card__badge--play">Play</span>
      </a>

      <!-- Number Connect: 아직 준비 중 -->
      <div class="card card--soon" aria-disabled="true">
        <div class="card__icon" aria-hidden="true">🔢</div>
        <h2 class="card__title">Number Connect</h2>
        <p class="card__desc">숫자를 순서대로 연결해보세요</p>
        <span class="card__badge card__badge--soon">Coming Soon</span>
      </div>

    </main>

  </div><!-- /.wrapper -->

  <script src="shared/header.js"></script>
  <script>
    createHeader();
  </script>

</body>
</html>
