<!-- v0.1.0 : 최초 생성 - Clock Game UI (로직 없음, 더미 UI만)
     v0.1.1 : 입력칸 id, 키패드 data-key 속성 추가 (키패드 입력 기능 연동용)
     v0.1.2 : Gold/Combo span에 id 추가 (골드/콤보 표시 연동용)
     v0.1.3 : <object> → inline SVG로 교체 (모바일 렌더링 정확도 개선)
     v0.1.4 : 결과 화면 섹션 추가 -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clock Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 전체 화면을 감싸는 래퍼 (PC 가운데 정렬용) -->
  <div class="game-wrapper">

    <!-- 상단 정보 영역 (약 1/12) : Gold / Combo -->
    <header class="info-bar">
      <span id="display-gold"  class="info-bar__item info-bar__gold">🪙 0</span>
      <span id="display-combo" class="info-bar__item info-bar__combo">🔥 0</span>
    </header>

    <!-- 시계 영역 (약 1/2) : inline SVG (모바일 렌더링 정확도를 위해 object 대신 직접 삽입) -->
    <section class="clock-area">
      <svg id="clock-svg" class="clock-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

        <style>
          .clock-number {

            font-size: 28px;
            fill: #2d3a4a;
            text-anchor: middle;
            dominant-baseline: middle;
          }

        <!-- 시계판 외곽선 -->
        <circle id="clock-outline" cx="200" cy="200" r="190" fill="none" stroke="#2d3a4a" stroke-width="4" />

        <!-- 1~12 숫자 -->
        <g id="clock-numbers">
          <text x="276.00" y="68.36" class="clock-number">1</text>
          <text x="331.64" y="124.00" class="clock-number">2</text>
          <text x="352.00" y="200.00" class="clock-number">3</text>
          <text x="331.64" y="276.00" class="clock-number">4</text>
          <text x="276.00" y="331.64" class="clock-number">5</text>
          <text x="200.00" y="352.00" class="clock-number">6</text>
          <text x="124.00" y="331.64" class="clock-number">7</text>
          <text x="68.36" y="276.00" class="clock-number">8</text>
          <text x="48.00" y="200.00" class="clock-number">9</text>
          <text x="68.36" y="124.00" class="clock-number">10</text>
          <text x="124.00" y="68.36" class="clock-number">11</text>
          <text x="200.00" y="48.00" class="clock-number">12</text>
        </g>

        <!-- 시침 -->
        <g id="hour-hand">
          <path
            d="M195,200
               C194,186 194,170 189,150
               C186,136 191,118 200,110
               C209,118 214,136 211,150
               C206,170 206,186 205,200
               Z"
            fill="#b06a5e"
            stroke="none"
          />
          <line x1="200" y1="110" x2="200" y2="45" stroke="#b06a5e" stroke-width="2" stroke-linecap="round" />
        </g>

        <!-- 분침 -->
        <g id="minute-hand">
          <path
            d="M195,200
               C194,176 197,155 193,127
               C190.5,108 195,77 200,70
               C205,77 209.5,108 207,127
               C203,155 206,176 205,200
               Z"
            fill="#5b7ea6"
            stroke="none"
          />
          <line x1="200" y1="70" x2="200" y2="45" stroke="#5b7ea6" stroke-width="2" stroke-linecap="round" />
        </g>

        <!-- 초침 -->
        <g id="second-hand">
          <line x1="200" y1="200" x2="200" y2="45" stroke="#2d3a4a" stroke-width="2" stroke-linecap="round" />
        </g>

        <!-- 중심 고정핀 -->
        <circle id="clock-center-pin" cx="200" cy="200" r="7" fill="#2d3a4a" />

      </svg>
    </section>

    <!-- 입력 영역 (약 1/6) : 시 / 분 / 초 입력칸 -->
    <section class="input-area">

      <div class="input-group">
        <span id="input-hour" class="input-box">--</span>
        <span class="input-label">시</span>
      </div>

      <div class="input-group">
        <span id="input-minute" class="input-box">--</span>
        <span class="input-label">분</span>
      </div>

      <div class="input-group">
        <span id="input-second" class="input-box">--</span>
        <span class="input-label">초</span>
      </div>

    </section>

    <!-- 키패드 영역 (약 1/4) : 숫자 0~9, ← / → 더미 버튼 -->
    <section class="keypad-area">

      <!-- 왼쪽 이동 버튼 (숫자 2행 전체 높이) -->
      <button type="button" class="keypad-btn keypad-btn--nav" data-key="back" aria-label="이전">←</button>

      <!-- 숫자 버튼 2행 -->
      <div class="keypad-numbers">
        <div class="keypad-row">
          <button type="button" class="keypad-btn" data-key="1">1</button>
          <button type="button" class="keypad-btn" data-key="2">2</button>
          <button type="button" class="keypad-btn" data-key="3">3</button>
          <button type="button" class="keypad-btn" data-key="4">4</button>
          <button type="button" class="keypad-btn" data-key="5">5</button>
        </div>
        <div class="keypad-row">
          <button type="button" class="keypad-btn" data-key="6">6</button>
          <button type="button" class="keypad-btn" data-key="7">7</button>
          <button type="button" class="keypad-btn" data-key="8">8</button>
          <button type="button" class="keypad-btn" data-key="9">9</button>
          <button type="button" class="keypad-btn" data-key="0">0</button>
        </div>
      </div>

      <!-- 오른쪽 이동 버튼 (숫자 2행 전체 높이) -->
      <button type="button" class="keypad-btn keypad-btn--nav" data-key="next" aria-label="다음">→</button>

    </section>

  </div><!-- /.game-wrapper -->

  <!-- 결과 화면 (단계 종료 시 표시, 기본적으로 숨김) -->
  <div id="result-screen" class="result-screen result-screen--hidden">
    <div class="result-card">
      <h2 id="result-level"  class="result-level">Lv.1 완료!</h2>
      <p  id="result-score"  class="result-score">5 / 5</p>
      <p  id="result-rate"   class="result-rate">정답률 100%</p>
      <p  id="result-combo"  class="result-combo">최고 콤보 🔥 5</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
