<!-- v0.1.0 : 최초 생성 - Clock Game UI (로직 없음, 더미 UI만)
     v0.1.1 : 입력칸 id, 키패드 data-key 속성 추가 (키패드 입력 기능 연동용) -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clock Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 전체 화면을 감싸는 래퍼 (PC 가운데 정렬용) -->
  <div class="game-wrapper">

    <!-- 상단 정보 영역 (약 1/12) : Gold / Combo -->
    <header class="info-bar">
      <span class="info-bar__item info-bar__gold">Gold 0</span>
      <span class="info-bar__item info-bar__combo">Combo 0</span>
    </header>

    <!-- 시계 영역 (약 1/2) : clock-face.svg 표시 -->
    <section class="clock-area">
      <object id="clock-object" type="image/svg+xml" data="assets/svg/clock-face.svg" class="clock-svg">시계</object>
    </section>

    <!-- 입력 영역 (약 1/6) : 시 / 분 / 초 입력칸 -->
    <section class="input-area">

      <div class="input-group">
        <span id="input-hour" class="input-box">--</span>
        <span class="input-label">시</span>
      </div>

      <div class="input-group">
        <span id="input-minute" class="input-box">--</span>
        <span class="input-label">분</span>
      </div>

      <div class="input-group">
        <span id="input-second" class="input-box">--</span>
        <span class="input-label">초</span>
      </div>

    </section>

    <!-- 키패드 영역 (약 1/4) : 숫자 0~9, ← / → 더미 버튼 -->
    <section class="keypad-area">

      <!-- 왼쪽 이동 버튼 (숫자 2행 전체 높이) -->
      <button type="button" class="keypad-btn keypad-btn--nav" data-key="back" aria-label="이전">←</button>

      <!-- 숫자 버튼 2행 -->
      <div class="keypad-numbers">
        <div class="keypad-row">
          <button type="button" class="keypad-btn" data-key="1">1</button>
          <button type="button" class="keypad-btn" data-key="2">2</button>
          <button type="button" class="keypad-btn" data-key="3">3</button>
          <button type="button" class="keypad-btn" data-key="4">4</button>
          <button type="button" class="keypad-btn" data-key="5">5</button>
        </div>
        <div class="keypad-row">
          <button type="button" class="keypad-btn" data-key="6">6</button>
          <button type="button" class="keypad-btn" data-key="7">7</button>
          <button type="button" class="keypad-btn" data-key="8">8</button>
          <button type="button" class="keypad-btn" data-key="9">9</button>
          <button type="button" class="keypad-btn" data-key="0">0</button>
        </div>
      </div>

      <!-- 오른쪽 이동 버튼 (숫자 2행 전체 높이) -->
      <button type="button" class="keypad-btn keypad-btn--nav" data-key="next" aria-label="다음">→</button>

    </section>

  </div><!-- /.game-wrapper -->

  <script src="script.js"></script>
</body>
</html>
