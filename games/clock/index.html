<!-- v0.1.0 : 최초 생성 - Clock Game UI (로직 없음, 더미 UI만)
     v0.1.1 : 입력칸 id, 키패드 data-key 속성 추가 (키패드 입력 기능 연동용)
     v0.1.2 : Gold/Combo span에 id 추가 (골드/콤보 표시 연동용)
     v0.1.3 : <object> → inline SVG로 교체 (모바일 렌더링 정확도 개선)
     v0.1.4 : 결과 화면 섹션 추가
     v0.1.5 : 결과 화면에 별점·보상 항목 추가
     v0.1.6 : Gold 아이콘 변경(💎), 결과 화면 레이아웃 개선
     v0.1.7 : 단계 선택 화면 select.html로 분리, game-wrapper style:none 제거
     v0.1.8 : 계산식 표시 영역 추가 (Lv.6~8)
     v0.1.9 : Fix_save.js 대신 core/saveManager.js 로드 (SaveManager 미정의로 저장 실패하던 문제)
     v0.1.10 : Implement_오답 시 정답 확인 모달 추가 (바깥 클릭 시 닫힘)
     v0.1.11 : Refactor_시계 페이스(외곽선/눈금/숫자)를 assets/svg/clock-face.svg로 분리, 바늘은 인라인 유지 -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clock Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 전체 화면을 감싸는 래퍼 (PC 가운데 정렬용) -->
  <div id="game-wrapper" class="game-wrapper">

    <!-- 상단 정보 영역 (약 1/12) : Combo(좌) / Gold(우) -->
    <header class="info-bar">
      <span class="info-bar__item info-bar__combo">
        <span class="info-bar__icon">🔥</span>
        <span id="display-combo" class="info-bar__value">0</span>
      </span>
      <span class="info-bar__item info-bar__gold">
        <span class="info-bar__icon">💎</span>
        <span id="display-gold" class="info-bar__value">0</span>
      </span>
    </header>

    <!-- 시계 영역 (약 1/2) -->
    <!-- 시계 페이스(외곽선/눈금/숫자)는 assets/svg/clock-face.svg 외부 파일을 불러와 배경으로 표시하고,
         바늘/중심 고정핀은 그 위에 겹쳐지는 인라인 SVG로 그대로 유지한다 (script.js가 회전시키므로 DOM에 있어야 함). -->
    <section class="clock-area">
      <div id="clock-svg" class="clock-svg">
        <img class="clock-face-img" src="assets/svg/clock-face.svg" alt="시계 눈금과 숫자" />
        <svg class="clock-hands-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

        <!-- 시침 -->
        <g id="hour-hand">
          <path
         id="hour-hand-path"
         fill="#b06a5e"
         stroke="#b06a5e"
         stroke-width="2"
         stroke-linecap="round"
         d="M 200.29114,109.25651 
         V 44.256506 
         m -5,155.000004 
         c -1,-14 -1,-30 -6,-50 
         -3,-14 6.08838,-26.53126 10.99916,-39.98355 
         4.77369,13.48296 14.00084,25.98355 11.00084,39.98355 
         -5,20 -5,36 -6,50 
         z" />
        </g>

        <!-- 분침 -->
        <g id="minute-hand">
          <path
          id="minute-hand-path"
          fill="#5b7ea6"
          stroke="#5b7ea6"
          stroke-width="2"
          stroke-linecap="round"
          d="m 200,70
          c 0,-8.333333 0,-16.666667 0,-25
          m -5,155
          c -0.84616,-24.32496 1.78524,-48.81858 -2,-73
         -2.11151,-21.46944 3.81812,-42.576557 7.00486,-63.641633
         3.30475,20.754501 8.89565,41.567173 7.10526,62.743173
         -3.8354,24.09977 -1.37963,48.52212 -2.06613,72.77562
         -0.1114,2.24444 -3.92398,0.63986 -5.72918,1.12284
         -1.43827,0 -2.87654,0 -4.31481,0
          z" />
        </g>

        <!-- 초침 -->
        <g id="second-hand">
          <line x1="200" y1="200" x2="200" y2="45" stroke="#2d3a4a" stroke-width="2" stroke-linecap="round" />
        </g>

        <!-- 중심 고정핀 -->
        <circle id="clock-center-pin" cx="200" cy="200" r="7" fill="#2d3a4a" />

        </svg>
      </div>
    </section>

    <!-- 계산식 표시 영역 (Lv.6~8에서만 표시, 기본 숨김) -->
    <section id="calc-area" class="calc-area calc-area--hidden">
      <p id="calc-expression" class="calc-expression"></p>
    </section>

    <!-- 입력 영역 (약 1/6) : 시 / 분 / 초 입력칸 -->
    <section class="input-area">

      <div class="input-group">
        <span id="input-hour" class="input-box">--</span>
        <span class="input-label">시</span>
      </div>

      <div class="input-group">
        <span id="input-minute" class="input-box">--</span>
        <span class="input-label">분</span>
      </div>

      <div class="input-group">
        <span id="input-second" class="input-box">--</span>
        <span class="input-label">초</span>
      </div>

    </section>

    <!-- 키패드 영역 (약 1/4) : 숫자 0~9, ← / → 더미 버튼 -->
    <section class="keypad-area">

      <!-- 왼쪽 이동 버튼 (숫자 2행 전체 높이) -->
      <button type="button" class="keypad-btn keypad-btn--nav" data-key="back" aria-label="이전">←</button>

      <!-- 숫자 버튼 2행 -->
      <div class="keypad-numbers">
        <div class="keypad-row">
          <button type="button" class="keypad-btn" data-key="1">1</button>
          <button type="button" class="keypad-btn" data-key="2">2</button>
          <button type="button" class="keypad-btn" data-key="3">3</button>
          <button type="button" class="keypad-btn" data-key="4">4</button>
          <button type="button" class="keypad-btn" data-key="5">5</button>
        </div>
        <div class="keypad-row">
          <button type="button" class="keypad-btn" data-key="6">6</button>
          <button type="button" class="keypad-btn" data-key="7">7</button>
          <button type="button" class="keypad-btn" data-key="8">8</button>
          <button type="button" class="keypad-btn" data-key="9">9</button>
          <button type="button" class="keypad-btn" data-key="0">0</button>
        </div>
      </div>

      <!-- 오른쪽 이동 버튼 (숫자 2행 전체 높이) -->
      <button type="button" class="keypad-btn keypad-btn--nav" data-key="next" aria-label="다음">→</button>

    </section>

  </div><!-- /.game-wrapper -->

  <!-- 결과 화면 (단계 종료 시 표시, 기본적으로 숨김) -->
  <div id="result-screen" class="result-screen result-screen--hidden">
    <div class="result-card">
      <h2 id="result-level"       class="result-level">Lv.1 완료!</h2>
      <p  id="result-stars"       class="result-stars">★★★</p>
      <p  id="result-score"       class="result-score">5 / 5</p>
      <p  id="result-rate"        class="result-rate">정답률 100%</p>
      <p  id="result-combo"       class="result-combo">최고 콤보 🔥 5</p>
      <hr class="result-divider" />
      <p  id="result-gold-quiz"   class="result-gold-row"><span>문제 정답</span><span class="result-gold-value">💎 0</span></p>
      <p  id="result-gold-combo"  class="result-gold-row"><span>콤보 보너스</span><span class="result-gold-value">💎 0</span></p>
      <p  id="result-gold-star"   class="result-gold-row"><span>별점 보너스</span><span class="result-gold-value">💎 0</span></p>
      <p  id="result-gold-total"  class="result-gold-total"><span>총 획득</span><span class="result-gold-value">💎 0</span></p>
    </div>
  </div>

  <!-- 오답 시 정답을 보여주는 모달 (기본 숨김) -->
  <!-- 카드 바깥(오버레이) 영역을 클릭하면 script.js에서 닫고 다음 문제로 진행한다 -->
  <div id="answer-modal" class="answer-modal answer-modal--hidden">
    <div class="answer-modal__card">
      <p class="answer-modal__label">정답</p>
      <p id="answer-modal-value" class="answer-modal__value">--</p>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
