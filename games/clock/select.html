<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clock Game - 단계 선택</title>
  <link rel="stylesheet" href="../../shared/header.css" />
  <link rel="stylesheet" href="select.css" />
</head>
<body>
  <div class="stage-select-wrapper">
    <h2 id="stage-select-title" class="stage-select-title">단계 선택</h2>
    <div id="stage-card-list" class="stage-card-list"></div>
  </div>

  <div id="debug-menu" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:999; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:8px; padding:16px; min-width:220px; display:flex; flex-direction:column; gap:8px; font-family:inherit;">
      <p style="font-weight:bold; margin:0 0 4px;">🔧 Debug Menu</p>
      <button type="button" data-debug="resetAll">전체 저장 초기화</button>
      <button type="button" data-debug="grantMaxGold">Gold 99999 지급</button>
      <button type="button" data-debug="unlockAllClockLevels">Clock 모든 단계 해금</button>
      <button type="button" data-debug="star1">모든 별 1개</button>
      <button type="button" data-debug="star2">모든 별 2개</button>
      <button type="button" data-debug="star3">모든 별 3개</button>
      <button type="button" id="debug-menu-close">닫기</button>
    </div>
  </div>

  <script type="module" src="select.js"></script>
</body>
</html>
