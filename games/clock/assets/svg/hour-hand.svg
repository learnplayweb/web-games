  <!-- ===========================
       4. 바늘 (시침/분침/초침)
       - 각 바늘은 중심(200,200)을 기준으로 위쪽(12시 방향)으로 그려서
         transform="rotate(각도 200 200)" 형태로 회전시킬 수 있는 구조
       - 현재는 12:00:00 정각이므로 회전 없이 고정 (transform 미적용)
       - JS에서 회전시킬 때는 각 g 태그에 transform="rotate(...)"만 추가하면 됨
  =========================== -->
  <!-- 시침: 비파형 몸통(중심→y=110) + 직선 연장(y=110→y=45), 색상 유지 -->
  <path
     id="line1"
     style="display:inline;fill:#b06a5e;fill-opacity:1;stroke:#b06a5e;stroke-width:2;stroke-linecap:round"
     d="M 200.29114,109.25651 V 44.256506 m -5,155.000004 c -1,-14 -1,-30 -6,-50 -3,-14 6.08838,-26.53126 10.99916,-39.98355 4.77369,13.48296 14.00084,25.98355 11.00084,39.98355 -5,20 -5,36 -6,50 z"
     sodipodi:nodetypes="cccccccc" />
</svg>
