<svg
  id="clock-svg"
  viewBox="0 0 400 400"
  xmlns="http://www.w3.org/2000/svg"
>  
<!-- ===========================
       4. 바늘 (시침/분침/초침)
       - 각 바늘은 중심(200,200)을 기준으로 위쪽(12시 방향)으로 그려서
         transform="rotate(각도 200 200)" 형태로 회전시킬 수 있는 구조
       - 현재는 12:00:00 정각이므로 회전 없이 고정 (transform 미적용)
  =========================== -->
    <!-- 초침: 가장 길고 얇게, 검정 -->
  <g id="second-hand">
    <line x1="200" y1="200" x2="200" y2="45" stroke="#2d3a4a" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>