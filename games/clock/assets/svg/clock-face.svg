  <!-- ===========================
       스타일 정의
       - 숫자 폰트는 키패드(Segoe UI, bold)와 통일성을 맞춤
  =========================== -->
  <style>
    .clock-number {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-weight: 700;
      font-size: 28px;
      fill: #2d3a4a;
      text-anchor: middle;
      dominant-baseline: middle;
    }
  </style>

  <!-- ===========================
       1. 시계판 외곽선
