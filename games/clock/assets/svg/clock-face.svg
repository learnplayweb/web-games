     v0.1.1 : 시침/분침 디자인을 직선 → 비파형(leaf) 형태로 변경
     v0.1.2 : 시침/분침 비파형 path 재작성 - 60~70% 지점 최대 너비, 동검 형태
     v0.1.3 : 시침 path 반영, 분침을 동일 구조로 재작성 -->
<svg
